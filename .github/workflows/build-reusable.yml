name: Reusable Build
on:
  workflow_call:
    inputs:

      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.11'
      bazel_version:
        description: 'Bazel version'
        required: false
        type: string
        default: '7.4.1'
      tf_version_spec:
        description: 'TensorFlow version specifier'
        required: false
        type: string
      keras_version_spec:
        description: 'Keras version specifier'
        required: false
        type: string
      test_tf_nightly:
        description: 'Whether to use tf-nightly'
        required: false
        type: boolean
        default: false
      legacy_keras:
        description: 'Value for TF_USE_LEGACY_KERAS'
        required: false
        type: string
        default: '0'
      tag_filters:
        description: 'Bazel test tag filters'
        required: false
        type: string
        default: ''
      job_name:
        description: 'Name of the caller job'
        required: false
        type: string
        default: 'build-and-test'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: linux-x86-n2-32
    defaults:
      run:
        shell: bash
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Bazel Version Checkup
        run: bazel version || sleep 5 && bazel version # work around potential flakiness on download
        env:
          USE_BAZEL_VERSION: ${{ inputs.bazel_version }}

      - name: Build and test wheel
        env:
          PYTHON_VERSION: ${{ inputs.python_version }}
          USE_BAZEL_VERSION: ${{ inputs.bazel_version }}
          TF_VERSION: ${{ inputs.tf_version_spec }}
          KERAS_VERSION_SPEC: ${{ inputs.keras_version_spec }}
          TAG_FILTERS: ${{ inputs.tag_filters }}
          TF_USE_LEGACY_KERAS: ${{ inputs.legacy_keras }}
          TEST_TF_NIGHTLY: ${{ inputs.test_tf_nightly }}

        run: ./ci/build-gha.sh

      - name: Send chat on failure
        # Only notify when the workflow runs on a schedule (daily CI).
        if: ${{ failure() && github.event_name == 'schedule' }}
        run: |
          curl --location --request POST '${{ secrets.GNN_BUILD_CHAT_WEBHOOK }}' \
            --header 'Content-Type: application/json' \
            --data-raw "{
              'text': 'GNN CI Failure: Job \"${{ github.workflow }} / ${{ inputs.job_name }}\" failed for Python ${{ inputs.python_version }}. \nRun: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID'
            }"
