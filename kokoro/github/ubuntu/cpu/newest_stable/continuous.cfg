build_file: "gnn/kokoro/github/ubuntu/cpu/build_versioned.sh"

env_vars: {
  key: "PYTHON_VERSION"
  value: "3.12"
}
env_vars: {
  key: "TF_VERSION"
  value: "2.21.*"
}
env_vars: {
  key: "TF_USE_LEGACY_KERAS"
  value: "1"
}
# Disable Vizier tests by default since vizier is now an extra dependency. b/394062744
env_vars: {
  key: "TAG_FILTERS"
  value: ",-vizier"
}

action {
  define_artifacts {
    regex: "**/sponge_log.log"
    regex: "**/sponge_log.xml"
  }
}